        <script>
            document.addEventListener("DOMContentLoaded", async function () {
                const loading = document.getElementById("__bundler_loading");
                function setStatus(msg) {
                    if (loading) loading.textContent = msg;
                }

                // Error sink persists across replaceWith since it's on window, not the DOM.
                window.addEventListener(
                    "error",
                    function (e) {
                        var p = document.body || document.documentElement;
                        var d =
                            document.getElementById("__bundler_err") ||
                            p.appendChild(document.createElement("div"));
                        d.id = "__bundler_err";
                        d.style.cssText =
                            "position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto";
                        d.textContent =
                            (d.textContent
                                ? d.textContent + String.fromCharCode(10)
                                : "") +
                            "[bundle] " +
                            (e.message || e.type) +
                            (e.filename
                                ? " (" +
                                  e.filename.slice(0, 60) +
                                  ":" +
                                  e.lineno +
                                  ")"
                                : "");
                    },
                    true,
                );

                try {
                    const manifestEl = document.querySelector(
                        'script[type="__bundler/manifest"]',
                    );
                    const templateEl = document.querySelector(
                        'script[type="__bundler/template"]',
                    );
                    if (!manifestEl || !templateEl) {
                        setStatus("Error: missing bundle data");
                        console.error(
                            "[bundler] Missing script tags — manifestEl:",
                            !!manifestEl,
                            "templateEl:",
                            !!templateEl,
                        );
                        return;
                    }

                    const manifest = JSON.parse(manifestEl.textContent);
                    let template = JSON.parse(templateEl.textContent);

                    const uuids = Object.keys(manifest);
                    setStatus("Unpacking " + uuids.length + " assets...");

                    const blobUrls = {};
                    await Promise.all(
                        uuids.map(async (uuid) => {
                            const entry = manifest[uuid];
                            try {
                                const binaryStr = atob(entry.data);
                                const bytes = new Uint8Array(binaryStr.length);
                                for (let i = 0; i < binaryStr.length; i++)
                                    bytes[i] = binaryStr.charCodeAt(i);

                                let finalBytes = bytes;
                                if (entry.compressed) {
                                    if (
                                        typeof DecompressionStream !==
                                        "undefined"
                                    ) {
                                        const ds = new DecompressionStream(
                                            "gzip",
                                        );
                                        const writer = ds.writable.getWriter();
                                        const reader = ds.readable.getReader();
                                        writer.write(bytes);
                                        writer.close();
                                        const chunks = [];
                                        let totalLen = 0;
                                        while (true) {
                                            const { done, value } =
                                                await reader.read();
                                            if (done) break;
                                            chunks.push(value);
                                            totalLen += value.length;
                                        }
                                        finalBytes = new Uint8Array(totalLen);
                                        let offset = 0;
                                        for (const chunk of chunks) {
                                            finalBytes.set(chunk, offset);
                                            offset += chunk.length;
                                        }
                                    } else {
                                        console.warn(
                                            "DecompressionStream not available, asset " +
                                                uuid +
                                                " may not render",
                                        );
                                    }
                                }

                                blobUrls[uuid] = URL.createObjectURL(
                                    new Blob([finalBytes], {
                                        type: entry.mime,
                                    }),
                                );
                            } catch (err) {
                                console.error(
                                    "Failed to decode asset " + uuid + ":",
                                    err,
                                );
                                blobUrls[uuid] = URL.createObjectURL(
                                    new Blob([], { type: entry.mime }),
                                );
                            }
                        }),
                    );

                    const extResEl = document.querySelector(
                        'script[type="__bundler/ext_resources"]',
                    );
                    const extResources = extResEl
                        ? JSON.parse(extResEl.textContent)
                        : [];
                    const resourceMap = {};
                    for (const entry of extResources) {
                        if (blobUrls[entry.uuid])
                            resourceMap[entry.id] = blobUrls[entry.uuid];
                    }

                    setStatus("Rendering...");
                    for (const uuid of uuids)
                        template = template.split(uuid).join(blobUrls[uuid]);

                    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
                    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
                    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
                    template = template
                        .replace(/\s+integrity="[^"]*"/gi, "")
                        .replace(/\s+crossorigin="[^"]*"/gi, "");

                    const resourceScript =
                        "<script>window.__resources = " +
                        JSON.stringify(resourceMap)
                            .split("</" + "script>")
                            .join("<\\/" + "script>") +
                        ";</" +
                        "script>";
                    // Inject after <head> so the DOCTYPE stays first; prepending the script
                    // would push the parser into quirks mode. DOMParser always emits a <head>
                    // (synthesizing one if the source HTML omitted it) but may carry
                    // attributes through, so match the full opening tag. slice() rather than
                    // replace() keeps us clear of $-pattern substitution in resourceScript.
                    const headOpen = template.match(/<head[^>]*>/i);
                    if (headOpen) {
                        const i = headOpen.index + headOpen[0].length;
                        template =
                            template.slice(0, i) +
                            resourceScript +
                            template.slice(i);
                    }

                    // Parse the template and swap the root element. Scripts inserted via
                    // DOMParser/replaceWith are inert per spec — re-create each with
                    // createElement so they execute, awaiting onload for src scripts to
                    // preserve ordering (React before ReactDOM before Babel before text/babel).
                    const doc = new DOMParser().parseFromString(
                        template,
                        "text/html",
                    );
                    document.documentElement.replaceWith(doc.documentElement);
                    const dead = Array.from(document.scripts);
                    for (const old of dead) {
                        const s = document.createElement("script");
                        for (const a of old.attributes)
                            s.setAttribute(a.name, a.value);
                        s.textContent = old.textContent;
                        // text/babel scripts with a src: fetch and inline. transformScriptTags
                        // does XHR against the src, but blob:null/ from a file:// origin is
                        // silently dropped. Inlining makes it a plain inline babel script,
                        // which transformScriptTags handles unconditionally.
                        if (
                            (s.type === "text/babel" ||
                                s.type === "text/jsx") &&
                            s.src
                        ) {
                            const r = await fetch(s.src);
                            s.textContent = await r.text();
                            s.removeAttribute("src");
                        }
                        const p = s.src
                            ? new Promise(function (r) {
                                  s.onload = s.onerror = r;
                              })
                            : null;
                        old.replaceWith(s);
                        if (p) await p;
                    }
                    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
                    // which fired before we swapped the document. Trigger manually if present.
                    if (
                        window.Babel &&
                        typeof window.Babel.transformScriptTags === "function"
                    ) {
                        window.Babel.transformScriptTags();
                    }
                } catch (err) {
                    setStatus("Error unpacking: " + err.message);
                    console.error("Bundle unpack error:", err);
                }
            });
        </script>

c84-0ef97a24d0d7\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Raleway';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"0e65e479-4324-4b43-a493-5699e9eb1f74\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Raleway';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"6a9abc36-653a-4152-9b90-eccbe2f2521e\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  :root{\n    /* palette — GERUNDIO */\n    --ink:#0A0A0B;\n    --ink-2:#16161A;\n    --paper:#FFFFFF;\n    --paper-2:#F2F2F0;\n    --line:#E2E2DE;\n    --muted:#6B6B70;\n    --blue:#465FFF;\n    --aqua:#01FFB4;\n    --yellow:#DDFF00;\n    --pink:#F425AE;\n    --cyan:#7AF7FF;\n\n    /* type scale @1920×1080 */\n    --type-display:128px;\n    --type-title:74px;\n    --type-subtitle:42px;\n    --type-lead:38px;\n    --type-body:30px;\n    --type-small:24px;\n    --type-kicker:24px;\n    --type-mega:200px;\n\n    /* spacing */\n    --pad-top:96px;\n    --pad-bottom:80px;\n    --pad-x:110px;\n    --gap-title:40px;\n    --gap-item:26px;\n\n    --mono:'Fira Code',ui-monospace,monospace;\n    --sans:'Raleway',system-ui,sans-serif;\n  }\n\n  *{box-sizing:border-box;}\n  html,body{margin:0;padding:0;background:#000;}\n  deck-stage:not(:defined){visibility:hidden;}\n\n  section{font-family:var(--sans);color:var(--ink);overflow:hidden;}\n  .frame{\n    width:100%;height:100%;box-sizing:border-box;\n    padding:var(--pad-top) var(--pad-x) var(--pad-bottom);\n    display:flex;flex-direction:column;position:relative;\n  }\n  .dark{background:var(--ink);color:#fff;}\n  .light{background:var(--paper);color:var(--ink);}\n\n  /* shared atoms */\n  .kicker{\n    font-family:var(--mono);font-weight:500;\n    font-size:var(--type-kicker);letter-spacing:0.22em;text-transform:uppercase;\n    display:flex;align-items:center;gap:18px;\n  }\n  .kicker .dot{width:11px;height:11px;border-radius:50%;background:var(--blue);flex:none;}\n  .title{\n    font-family:var(--sans);font-weight:800;\n    font-size:var(--type-title);line-height:1.0;letter-spacing:-0.018em;\n    text-wrap:balance;margin:0;\n  }\n  .lead{\n    font-weight:400;font-size:var(--type-lead);line-height:1.32;\n    max-width:24ch;text-wrap:pretty;\n  }\n  .body{font-weight:400;font-size:var(--type-body);line-height:1.42;color:var(--muted);text-wrap:pretty;}\n  .dark .body{color:#9A9AA2;}\n\n  /* deck footer */\n  .ft{\n    position:absolute;left:var(--pad-x);right:var(--pad-x);bottom:42px;\n    display:flex;justify-content:space-between;align-items:center;\n    font-family:var(--mono);font-size:24px;letter-spacing:0.1em;text-transform:uppercase;\n    color:var(--muted);\n  }\n  .dark .ft{color:#5A5A62;}\n  .ft img{height:20px;opacity:.9;}\n\n  .hr-neon{height:4px;width:120px;background:var(--blue);border:0;margin:0;}\n\n  /* ===== SLIDE 1 — PORTADA ===== */\n  .cover{justify-content:space-between;}\n  .cover .topbar{display:flex;justify-content:space-between;align-items:flex-start;}\n  .cover .wm{height:34px;}\n  .cover .yr{font-family:var(--mono);font-size:var(--type-kicker);letter-spacing:0.2em;color:var(--aqua);white-space:nowrap;}\n  .cover h1{\n    font-family:var(--sans);font-weight:800;font-size:var(--type-display);line-height:0.92;\n    letter-spacing:-0.03em;margin:0;\n  }\n  .cover h1 .l2{color:var(--blue);}\n  .cover .sub{font-weight:300;font-size:var(--type-subtitle);line-height:1.28;max-width:22ch;margin-top:34px;color:#D8D8DE;}\n  .cover .meta{display:flex;gap:56px;font-family:var(--mono);font-size:24px;letter-spacing:0.04em;color:#7E7E86;}\n  .cover .meta b{display:block;color:#fff;font-weight:500;margin-top:8px;text-transform:none;letter-spacing:0.02em;}\n  .gerunds{\n    position:absolute;inset:0;overflow:hidden;pointer-events:none;\n    font-family:var(--mono);font-size:30px;line-height:2.1;color:#fff;opacity:0.05;\n    white-space:nowrap;padding:140px 0 0 60px;letter-spacing:0.1em;\n  }\n\n  /* ===== SECTION HELPERS ===== */\n  .head{display:flex;flex-direction:column;gap:22px;}\n  .head .title{margin-top:6px;}\n\n  /* stat row */\n  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:0;margin-top:auto;}\n  .stat{padding:0 44px;border-left:2px solid var(--line);}\n  .stat:first-child{padding-left:0;border-left:0;}\n  .dark .stat{border-color:#2A2A30;}\n  .stat .num{font-family:var(--mono);font-weight:600;font-size:96px;line-height:1;letter-spacing:-0.03em;}\n  .stat .lab{font-size:25px;line-height:1.3;color:var(--muted);margin-top:18px;max-width:15ch;}\n  .dark .stat .lab{color:#9A9AA2;}\n\n  /* two columns */\n  .cols2{display:grid;grid-template-columns:1fr 1fr;gap:0;margin-top:56px;flex:1;}\n  .col{padding:48px 56px;display:flex;flex-direction:column;}\n  .col.l{background:var(--paper-2);}\n  .col.r{background:var(--ink);color:#fff;}\n  .col .ctag{font-family:var(--mono);font-size:24px;letter-spacing:0.16em;text-transform:uppercase;margin-bottom:30px;display:flex;align-items:center;gap:14px;}\n  .col.l .ctag{color:var(--muted);}\n  .col.r .ctag{color:var(--aqua);}\n  .clist{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:24px;}\n  .clist li{font-size:30px;line-height:1.3;padding-left:34px;position:relative;}\n  .clist li::before{content:\"\";position:absolute;left:0;top:14px;width:14px;height:14px;}\n  .col.l .clist li::before{background:var(--muted);border-radius:50%;}\n  .col.r .clist li::before{background:var(--blue);}\n\n  /* pillars */\n  .pillars{display:grid;grid-template-columns:repeat(4,1fr);gap:30px;margin-top:auto;flex:1;align-content:end;}\n  .pillar{display:flex;flex-direction:column;border-top:4px solid var(--ink);padding-top:30px;height:100%;justify-content:flex-start;}\n  .pillar:nth-child(1){border-color:var(--blue);}\n  .pillar:nth-child(2){border-color:var(--aqua);}\n  .pillar:nth-child(3){border-color:var(--yellow);}\n  .pillar:nth-child(4){border-color:var(--pink);}\n  .pillar .pn{font-family:var(--mono);font-size:24px;letter-spacing:0.1em;color:var(--muted);}\n  .pillar h3{font-family:var(--sans);font-weight:700;font-size:34px;line-height:1.08;margin:22px 0 18px;letter-spacing:-0.01em;}\n  .pillar p{font-size:24px;line-height:1.4;color:var(--muted);margin:0;}\n\n  /* projection (dark big numbers) */\n  .proj{display:grid;grid-template-columns:repeat(3,1fr);gap:0;margin-top:auto;}\n  .proj .p{padding:0 50px;border-left:2px solid #2A2A30;}\n  .proj .p:first-child{padding-left:0;border-left:0;}\n  .proj .big{font-family:var(--mono);font-weight:600;font-size:138px;line-height:0.95;letter-spacing:-0.04em;}\n  .proj .p:nth-child(1) .big{color:var(--aqua);}\n  .proj .p:nth-child(2) .big{color:var(--yellow);}\n  .proj .p:nth-child(3) .big{color:var(--cyan);}\n  .proj .big small{font-size:54px;font-weight:500;}\n  .proj .cap{font-size:26px;line-height:1.34;color:#9A9AA2;margin-top:24px;max-width:16ch;}\n  .proj .delta{font-family:var(--mono);font-size:24px;letter-spacing:0.06em;color:#fff;margin-top:14px;text-transform:uppercase;}\n\n  /* roadmap timeline */\n  .road{margin-top:56px;flex:1;display:flex;flex-direction:column;justify-content:center;}\n  .road .axis{position:relative;height:3px;background:var(--line);margin:0 2% 0;}\n  .phases{display:grid;grid-template-columns:repeat(4,1fr);gap:30px;margin-top:0;}\n  .phase{position:relative;padding-top:48px;}\n  .phase::before{content:\"\";position:absolute;top:-13px;left:0;width:24px;height:24px;border-radius:50%;background:var(--ink);border:5px solid var(--paper);box-shadow:0 0 0 3px var(--ink);}\n  .phase:nth-child(1)::before{background:var(--blue);box-shadow:0 0 0 3px var(--blue);}\n  .phase:nth-child(2)::before{background:var(--aqua);box-shadow:0 0 0 3px var(--aqua);}\n  .phase:nth-child(3)::before{background:var(--yellow);box-shadow:0 0 0 3px var(--yellow);}\n  .phase:nth-child(4)::before{background:var(--pink);box-shadow:0 0 0 3px var(--pink);}\n  .phase .q{font-family:var(--mono);font-size:24px;letter-spacing:0.12em;color:var(--muted);text-transform:uppercase;}\n  .phase h3{font-family:var(--sans);font-weight:800;font-size:38px;line-height:1.02;margin:14px 0 20px;letter-spacing:-0.015em;}\n  .phase ul{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:13px;}\n  .phase li{font-size:24px;line-height:1.28;color:#3C3C42;padding-left:24px;position:relative;}\n  .phase li::before{content:\"—\";position:absolute;left:0;color:var(--muted);}\n\n  /* semester detail cards */\n  .sem{display:grid;grid-template-columns:1fr 1fr;gap:40px;margin-top:54px;flex:1;}\n  .fcard{border:2px solid var(--line);border-radius:4px;padding:46px 48px;display:flex;flex-direction:column;position:relative;overflow:hidden;}\n  .fcard .bar{position:absolute;top:0;left:0;width:8px;height:100%;}\n  .fcard.f1 .bar{background:var(--blue);}\n  .fcard.f2 .bar{background:var(--aqua);}\n  .fcard.f3 .bar{background:var(--yellow);}\n  .fcard.f4 .bar{background:var(--pink);}\n  .fcard .fhead{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:8px;}\n  .fcard .fno{font-family:var(--mono);font-size:24px;letter-spacing:0.12em;color:var(--muted);text-transform:uppercase;}\n  .fcard .fwin{font-family:var(--mono);font-size:24px;color:var(--ink);font-weight:600;}\n  .fcard h3{font-family:var(--sans);font-weight:800;font-size:42px;letter-spacing:-0.02em;margin:6px 0 26px;}\n  .fcard ul{list-style:none;margin:0;padding:0;display:flex;flex-d
